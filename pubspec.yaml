name: air_quality_app
description: Air Quality Monitoring System - Breathe Smart, Live Healthy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.5.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Location & Permissions
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.0.0

  # Networking
  http: ^1.2.0

  # State Management
  provider: ^6.1.0

  # UI & Design
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1

  # Maps (100% FREE — OpenStreetMap + OSRM)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Storage
  shared_preferences: ^2.5.4

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true